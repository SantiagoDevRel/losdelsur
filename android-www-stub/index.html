<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Los Del Sur</title>
  <style>
    html,body{margin:0;padding:0;background:#000;color:#fff;font-family:system-ui,sans-serif;height:100%;-webkit-text-size-adjust:100%}
    .wrap{display:grid;place-items:center;min-height:100dvh;text-align:center;padding:24px}
    .brand{font-size:10px;letter-spacing:.25em;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:24px}
    h1{font-size:20px;text-transform:uppercase;letter-spacing:.05em;margin:0}
    p{font-size:13px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.04em;margin-top:12px}
    button{margin-top:24px;border:2px solid #84ff60;background:rgba(132,255,96,.1);color:#84ff60;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;border-radius:8px;font-size:11px;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="brand">LOS DEL SUR</div>
      <h1>SIN CONEXIÓN</h1>
      <p>No pudimos contactar el servidor. Revisá tu internet y reintentá.</p>
      <button onclick="location.reload()">REINTENTAR</button>
    </div>
  </div>
</body>
</html>
